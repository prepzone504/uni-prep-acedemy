<!DOCTYPE html>
<html lang="en">

<head>

    <script>
        (function () {
            if (window._initialLoaderAdded) return; window._initialLoaderAdded = true;
            document.documentElement.style.backgroundColor = '#060d1f';
            var l = document.createElement('div');
            l.id = 'global-initial-loader';
            l.style.cssText = 'position:fixed;inset:0;background:#060d1f;z-index:9999999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s ease;';
            l.innerHTML = '<style>@keyframes spa-spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes spa-glow-pulse{0%,100%{box-shadow:0 0 15px rgba(6,182,212,0.4),inset 0 0 10px rgba(37,99,235,0.4)}50%{box-shadow:0 0 30px rgba(6,182,212,0.8),inset 0 0 20px rgba(37,99,235,0.8)}}.spa-spinner{width:70px;height:70px;border:4px solid rgba(255,255,255,0.1);border-top-color:#06b6d4;border-right-color:#3b82f6;border-radius:50%;animation:spa-spin 1s linear infinite,spa-glow-pulse 2s ease-in-out infinite;margin-bottom:24px;position:relative}.spa-spinner::after{content:"";position:absolute;top:-4px;left:-4px;right:-4px;bottom:-4px;border-radius:50%;border:4px solid transparent;border-bottom-color:rgba(6,182,212,0.5);animation:spa-spin 1.5s cubic-bezier(0.68,-0.55,0.265,1.55) infinite reverse}.spa-loading-text{font-family:"Outfit",sans-serif;font-size:15px;font-weight:700;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(135deg,#fff,#93c5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:spa-pulse-text 1.5s ease-in-out infinite}@keyframes spa-pulse-text{0%,100%{opacity:0.6;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}</style><div class="spa-spinner"></div><div class="spa-loading-text">Loading</div>';
            document.documentElement.appendChild(l);
            window.addEventListener('load', function () {
                l.style.opacity = '0';
                setTimeout(function () { if (l.parentNode) l.remove(); }, 500);
            });
        })();
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="UniPrep — Select Exam Duration" />
    <title>Set Timer | UniPrep</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="exam_prep.css" />
    <script src="../side_nav_bar/side_nav_bar.js"></script>

    <style>
        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            position: relative;
            z-index: 10;
        }

        .timer-card {
            background: rgba(8, 16, 45, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeUp 0.6s ease;
        }

        .timer-icon {
            font-size: 48px;
            margin-bottom: 16px;
            animation: float 3s ease-in-out infinite;
        }

        .timer-title {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .timer-sub {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .time-display-wrapper {
            background: rgba(37, 99, 235, 0.08);
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 40px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.2);
        }

        .time-value {
            font-family: 'Outfit', sans-serif;
            font-size: 56px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 8px;
        }

        .time-label {
            color: #60a5fa;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Range Slider Styling */
        .slider-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 40px;
            padding: 0 10px;
        }

        .timer-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            outline: none;
            transition: background 0.2s;
        }

        .timer-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #06b6d4;
            border: 3px solid #fff;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.6);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .timer-slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.8);
        }

        .timer-slider::-moz-range-thumb {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #06b6d4;
            border: 3px solid #fff;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.6);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .slider-ticks {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            font-weight: 500;
            padding: 0 5px;
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        /* Responsive Fixes */
        @media (max-width: 600px) {
            .timer-container {
                padding: 16px;
                padding-top: 80px;
            }
            .timer-card {
                padding: 24px;
                border-radius: 20px;
            }
            .time-value {
                font-size: 44px;
            }
            .timer-title {
                font-size: 22px;
            }
            .slider-ticks span {
                font-size: 11px;
            }
            .timer-icon {
                font-size: 38px;
            }
        }
    </style>

</head>

<body>

    <!-- Background Effects -->
    <div class="bg-fixed"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-bg"></div>

    <!-- Header Back Button -->
    <header class="exam-header" style="background: transparent; border: none; box-shadow: none; position: fixed; width: 100%; top: 0; z-index: 100;">
        <div class="header-left">
            <a href="topics/topics_list.html" class="back-btn" id="btn-back" title="Back">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12" />
                    <polyline points="12 19 5 12 12 5" />
                </svg>
            </a>
            <div class="header-titles">
                <span class="exam-course" id="header-course-badge" style="font-size: 16px; margin: 0;">Exam Timer</span>
            </div>
        </div>
    </header>

    <div class="timer-container">
        <div class="timer-card">
            <div class="timer-icon">⏱️</div>
            <h2 class="timer-title">Set Your Time Limit</h2>
            <p class="timer-sub">Choose a duration for your practice session to simulate real exam conditions.</p>

            <div class="time-display-wrapper">
                <div class="time-value" id="time-display">60</div>
                <div class="time-label" id="time-label">Minutes</div>
            </div>

            <div class="slider-wrapper">
                <!-- Range: 20 min to 300 min (5 hours), Step: 10 mins -->
                <input type="range" min="20" max="300" step="10" value="60" class="timer-slider" id="timer-slider">
                <div class="slider-ticks">
                    <span>20m</span>
                    <span>1h</span>
                    <span>2h</span>
                    <span>3h</span>
                    <span>4h</span>
                    <span>5h</span>
                </div>
            </div>

            <button class="btn-primary" id="btn-proceed" style="width: 100%; padding: 16px; font-size: 16px;">
                Proceed to Guidelines
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round" style="width: 18px; height: 18px; margin-left: 8px;">
                    <line x1="5" y1="12" x2="19" y2="12" />
                    <polyline points="12 5 19 12 12 19" />
                </svg>
            </button>

        </div>
    </div>

    <script src="../../js/router.js"></script>
    <script src="exam_timer.js"></script>
</body>

</html>

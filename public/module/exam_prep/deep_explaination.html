<!DOCTYPE html>
<html lang="en">

<head>

  <script>
    (function () {
      if (window._initialLoaderAdded) return; window._initialLoaderAdded = true;
      document.documentElement.style.backgroundColor = '#060d1f';
      var l = document.createElement('div');
      l.id = 'global-initial-loader';

      document.documentElement.appendChild(l);
      window.addEventListener('load', function () {

        setTimeout(function () { if (l.parentNode) l.remove(); }, 500);
      });
    })();
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="UniPrep — Deep Think Evaluation" />
  <title>Deep Think | UniPrep</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800;900&display=swap"
    rel="stylesheet" />
    
  <link rel="stylesheet" href="exam_prep.css" />
  
  <!-- MathJax Configuration -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      chtml: {
        displayAlign: 'left',
        scale: 0.95
      }
    };
  </script>
  
  <!-- MathJax for LaTeX Support -->
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <!-- Marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <script src="../side_nav_bar/side_nav_bar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body, html {
        height: 100%;
        margin: 0;
        overflow-y: auto; /* Scrollable UI */
        overflow-x: hidden; /* Prevent horizontal scroll on body */
    }
    
    * {
        box-sizing: border-box;
    }

    .deep-think-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 24px;
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      margin-top: 60px;
    }

    .dt-card {
      background: linear-gradient(145deg, rgba(12, 16, 33, 0.85), rgba(6, 9, 20, 0.95));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 50px rgba(6, 182, 212, 0.08), inset 0 0 20px rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      margin-bottom: 30px;
      position: relative;
      overflow: hidden;
    }
    
    .dt-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(250, 204, 21, 0.6), transparent);
    }

    .dt-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 24px;
    }

    .dt-icon {
      font-size: 32px;
      filter: drop-shadow(0 0 10px rgba(250, 204, 21, 0.5));
    }

    .dt-title {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: #facc15;
      margin: 0;
    }

    .dt-question-box {
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .dt-q-text {
      color: #fff;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .dt-answer-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .dt-answer-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      border-radius: 12px;
      background: rgba(255,255,255,0.015);
      border: 1px solid rgba(255,255,255,0.05);
      transition: all 0.3s ease;
    }
    
    .dt-answer-row:hover {
        background: rgba(255,255,255,0.03);
    }
    
    .dt-answer-row.correct {
        border-color: rgba(34, 197, 94, 0.5);
        background: linear-gradient(90deg, rgba(34, 197, 94, 0.1), rgba(34, 197, 94, 0.02));
        box-shadow: 0 0 20px rgba(34, 197, 94, 0.08);
    }
    
    .dt-answer-row.user-wrong {
        border-color: rgba(239, 68, 68, 0.5);
        background: linear-gradient(90deg, rgba(239, 68, 68, 0.1), rgba(239, 68, 68, 0.02));
        box-shadow: 0 0 20px rgba(239, 68, 68, 0.08);
    }

    .dt-explanation {
      font-size: 16px;
      line-height: 1.8;
      color: #cbd5e1;
      overflow-wrap: break-word;
      word-wrap: break-word;
      word-break: break-word;
      width: 100%;
      letter-spacing: 0.2px;
    }
    
    /* Premium Markdown Styles */
    .dt-explanation h1, .dt-explanation h2, .dt-explanation h3 {
        color: #f8fafc;
        margin-top: 36px;
        margin-bottom: 16px;
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        letter-spacing: -0.5px;
    }
    .dt-explanation h1 { font-size: 26px; }
    .dt-explanation h2 { font-size: 22px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
    .dt-explanation h3 { font-size: 18px; color: #93c5fd; }
    .dt-explanation p {
        margin-bottom: 20px;
    }
    .dt-explanation strong {
        color: #fff;
        font-weight: 600;
        background: rgba(255,255,255,0.05);
        padding: 2px 6px;
        border-radius: 4px;
    }
    .dt-explanation ul, .dt-explanation ol {
        padding-left: 24px;
        margin-bottom: 24px;
    }
    .dt-explanation li {
        margin-bottom: 8px;
    }
    .dt-explanation li::marker {
        color: #3b82f6;
    }
    .dt-explanation code {
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(255,255,255,0.08);
        color: #67e8f9;
        padding: 4px 8px;
        border-radius: 6px;
        font-family: 'Fira Code', monospace;
        font-size: 14px;
    }
    .dt-explanation blockquote {
        border-left: 4px solid #3b82f6;
        background: linear-gradient(90deg, rgba(59, 130, 246, 0.08), transparent);
        margin: 24px 0;
        padding: 16px 20px;
        border-radius: 0 8px 8px 0;
        font-style: italic;
        color: #94a3b8;
    }

    .dt-loader {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #facc15;
      font-weight: 600;
      font-size: 15px;
      margin-top: 20px;
    }
    
    .dt-spinner {
        width: 20px; height: 20px;
        border: 2px solid rgba(250, 204, 21, 0.2);
        border-top-color: #facc15;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* Advanced Algorithm / Responsive Fixes */
    @media (max-width: 600px) {
      .deep-think-container {
        padding: 20px 12px;
        margin-top: 60px;
      }
      .dt-card {
        padding: 20px;
        border-radius: 16px;
      }
      .dt-title {
        font-size: 20px;
      }
      .dt-icon {
        font-size: 26px;
      }
      .dt-q-text {
        font-size: 14px;
      }
      .dt-answer-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }
    }

    /* Prevent overflow for long equations */
    .dt-explanation {
      overflow-x: auto;
      max-width: 100%;
    }
    mjx-container {
      overflow-x: auto !important;
      overflow-y: hidden !important;
      max-width: 100%;
    }
    .MathJax {
      overflow-x: auto !important;
      overflow-y: hidden !important;
    }
  </style>

</head>

<body>

  <!-- Background Effects -->
  <div class="bg-fixed"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid-bg"></div>

  <!-- Header -->
  <header class="exam-header" style="background: transparent; border: none; box-shadow: none; position: fixed; width: 100%; top: 0; z-index: 100;">
    <div class="header-left">
      <button class="back-btn" id="btn-back" title="Back to Review" onclick="window.history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12" />
          <polyline points="12 19 5 12 12 5" />
        </svg>
      </button>
      <div class="header-titles">
        <span class="exam-course" style="font-size: 16px; margin: 0; color: #facc15;">Deep Think AI</span>
      </div>
    </div>
  </header>

  <div class="deep-think-container">
    <div class="dt-card">
      <div class="dt-header">
        <div class="dt-icon">💡</div>
        <h2 class="dt-title">AI Evaluation</h2>
      </div>



      <div class="dt-explanation" id="dt-explanation-content">
        <div class="dt-loader" id="dt-loader">
          <div class="dt-spinner"></div>
          Evaluating logic and comparing options...
        </div>
      </div>
    </div>
  </div>

  <script src="../../js/router.js"></script>
  <script src="deep_explaination.js"></script>
</body>

</html>

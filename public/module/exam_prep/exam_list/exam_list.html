<!DOCTYPE html>
<html lang="en">

<head>

  <script>
    (function(){
      if(window._initialLoaderAdded)return;window._initialLoaderAdded=true;
      document.documentElement.style.backgroundColor='#060d1f';
      var l=document.createElement('div');
      l.id='global-initial-loader';
      l.style.cssText='position:fixed;inset:0;background:#060d1f;z-index:9999999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s ease;';
      l.innerHTML='<style>@keyframes spa-spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes spa-glow-pulse{0%,100%{box-shadow:0 0 15px rgba(6,182,212,0.4),inset 0 0 10px rgba(37,99,235,0.4)}50%{box-shadow:0 0 30px rgba(6,182,212,0.8),inset 0 0 20px rgba(37,99,235,0.8)}}.spa-spinner{width:70px;height:70px;border:4px solid rgba(255,255,255,0.1);border-top-color:#06b6d4;border-right-color:#3b82f6;border-radius:50%;animation:spa-spin 1s linear infinite,spa-glow-pulse 2s ease-in-out infinite;margin-bottom:24px;position:relative}.spa-spinner::after{content:"";position:absolute;top:-4px;left:-4px;right:-4px;bottom:-4px;border-radius:50%;border:4px solid transparent;border-bottom-color:rgba(6,182,212,0.5);animation:spa-spin 1.5s cubic-bezier(0.68,-0.55,0.265,1.55) infinite reverse}.spa-loading-text{font-family:"Outfit",sans-serif;font-size:15px;font-weight:700;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(135deg,#fff,#93c5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:spa-pulse-text 1.5s ease-in-out infinite}@keyframes spa-pulse-text{0%,100%{opacity:0.6;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}</style><div class="spa-spinner"></div><div class="spa-loading-text">Loading</div>';
      document.documentElement.appendChild(l);
      window.addEventListener('load',function(){
        l.style.opacity='0';
        setTimeout(function(){if(l.parentNode)l.remove();},500);
      });
    })();
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="UniPrep Exam Prep — Browse all 100 Level courses and topics." />
  <title>Exam Prep · UniPrep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="exam_list.css" />
  <script src="../../side_nav_bar/side_nav_bar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <!-- Background Effects -->
  <div class="bg-fixed"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid-bg"></div>

  

  

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- TOP HEADER -->
    <header class="top-header">
      <div class="header-left">
        <button class="menu-btn" onclick="toggleSidebar()" aria-label="Open Sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <div class="header-titles">
          <h1 class="page-title">Exam Prep</h1>
          <p class="page-sub">Browse Courses — Choose a course to begin your preparation</p>
        </div>
      </div>
      <div class="header-right">
        <div class="search-bar" style="position: relative;">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="search-input" placeholder="Search courses or institution..." aria-label="Search courses" autocomplete="off" />
          <ul id="search-suggestions" class="autocomplete-suggestions" style="display:none; position:absolute; top:100%; left:0; right:0; background:rgba(30,41,59,0.95); backdrop-filter:blur(10px); z-index:1000; border-radius:12px; border:1px solid rgba(255,255,255,0.1); padding:0; margin-top:8px; list-style:none; max-height:250px; overflow-y:auto; box-shadow:0 10px 30px rgba(0,0,0,0.5);"></ul>
        </div>
        <button class="icon-btn" aria-label="Notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
        </button>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <div class="page-content">

      <!-- Page Intro Banner -->
      <div class="section-banner">
        <div class="banner-text">
          <span class="banner-tag">📚 All Levels</span>
          <h2 class="banner-title">University Courses</h2>
          <p class="banner-desc">Master every topic with our comprehensive question banks and practice exams.</p>
        </div>
        <div class="banner-stats">
          <div class="bstat">
            <span class="bstat-num" id="total-courses">8</span>
            <span class="bstat-label">Courses</span>
          </div>
          <div class="bstat">
            <span class="bstat-num" id="total-topics">42</span>
            <span class="bstat-label">Topics</span>
          </div>
          <div class="bstat">
            <span class="bstat-num" id="total-questions">1,240</span>
            <span class="bstat-label">Questions</span>
          </div>
        </div>
      </div>

      <!-- Mobile Search Bar -->
      <div class="mobile-search-bar" style="position: relative;">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" id="mobile-search-input" placeholder="Search courses or institution..."
          aria-label="Search courses" autocomplete="off" />
        <ul id="mobile-search-suggestions" class="autocomplete-suggestions" style="display:none; position:absolute; top:100%; left:0; right:0; background:rgba(30,41,59,0.95); backdrop-filter:blur(10px); z-index:1000; border-radius:0 0 12px 12px; border:1px solid rgba(255,255,255,0.1); padding:0; margin:0; list-style:none; max-height:200px; overflow-y:auto; box-shadow:0 10px 20px rgba(0,0,0,0.5);"></ul>
      </div>

      <!-- Filter Tabs Removed -->

      <!-- Course Cards Grid -->
      <div class="courses-grid" id="courses-grid"></div>

    </div>
  </main>

  <script src="exam_list.js"></script>
</body>

</html>

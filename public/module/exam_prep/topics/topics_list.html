<!DOCTYPE html>
<html lang="en">

<head>

  <script>
    (function () {
      if (window._initialLoaderAdded) return; window._initialLoaderAdded = true;
      document.documentElement.style.backgroundColor = '#060d1f';
      var l = document.createElement('div');
      l.id = 'global-initial-loader';
      l.style.cssText = 'position:fixed;inset:0;background:#060d1f;z-index:9999999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s ease;';
      l.innerHTML = '<style>@keyframes spa-spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes spa-glow-pulse{0%,100%{box-shadow:0 0 15px rgba(6,182,212,0.4),inset 0 0 10px rgba(37,99,235,0.4)}50%{box-shadow:0 0 30px rgba(6,182,212,0.8),inset 0 0 20px rgba(37,99,235,0.8)}}.spa-spinner{width:70px;height:70px;border:4px solid rgba(255,255,255,0.1);border-top-color:#06b6d4;border-right-color:#3b82f6;border-radius:50%;animation:spa-spin 1s linear infinite,spa-glow-pulse 2s ease-in-out infinite;margin-bottom:24px;position:relative}.spa-spinner::after{content:"";position:absolute;top:-4px;left:-4px;right:-4px;bottom:-4px;border-radius:50%;border:4px solid transparent;border-bottom-color:rgba(6,182,212,0.5);animation:spa-spin 1.5s cubic-bezier(0.68,-0.55,0.265,1.55) infinite reverse}.spa-loading-text{font-family:"Outfit",sans-serif;font-size:15px;font-weight:700;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(135deg,#fff,#93c5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:spa-pulse-text 1.5s ease-in-out infinite}@keyframes spa-pulse-text{0%,100%{opacity:0.6;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}</style><div class="spa-spinner"></div><div class="spa-loading-text">Loading</div>';
      document.documentElement.appendChild(l);
      window.addEventListener('load', function () {
        l.style.opacity = '0';
        setTimeout(function () { if (l.parentNode) l.remove(); }, 500);
      });
    })();
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="UniPrep — Select a topic and start practicing." />
  <title>Topics · UniPrep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="topics_list.css" />
  <script src="../../side_nav_bar/side_nav_bar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <!-- Background Effects -->
  <div class="bg-fixed"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid-bg"></div>





  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- TOP HEADER -->
    <header class="top-header">
      <div class="header-left">
        <button class="menu-btn" onclick="toggleSidebar()" aria-label="Open Sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <a href="../exam_list/exam_list.html" class="back-btn" title="Back to Courses">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12" />
            <polyline points="12 19 5 12 12 5" />
          </svg>
        </a>
        <div class="header-titles">
          <h1 class="page-title" id="header-course-title">Mathematics</h1>
          <p class="page-sub" id="header-course-sub">Select a topic to start practicing</p>
        </div>
      </div>
      <div class="header-right">
        <div class="course-badge" id="header-course-badge">MTH101</div>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <div class="page-content">

      <!-- "Practice All" Hero Card -->
      <div class="practice-all-card" id="practice-all-card">
        <div class="pa-left">
          <div class="pa-icon">⚡</div>
          <div class="pa-text">
            <h2 class="pa-title">Practice All Topics</h2>
            <p class="pa-desc" id="pa-desc">Complete CBT simulation with all questions shuffled across all topics.</p>
          </div>
        </div>
        <div class="pa-right">
          <div class="pa-stats">
            <div class="pa-stat">
              <span class="pa-stat-num" id="pa-total-q">40</span>
              <span class="pa-stat-label">Questions</span>
            </div>
            <div class="pa-stat">
              <span class="pa-stat-num" id="pa-total-t">8</span>
              <span class="pa-stat-label">Topics</span>
            </div>
          </div>
          <a href="../exam_prep.html?mode=all" class="btn-practice-all" id="btn-practice-all">
            Start Full Practice
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
              stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12" />
              <polyline points="12 5 19 12 12 19" />
            </svg>
          </a>
        </div>
      </div>

      <!-- Section Heading -->
      <div class="topics-section-header">
        <h2 class="topics-section-title">Practice by Topic</h2>
        <p class="topics-section-sub">Master one area at a time for better retention.</p>
      </div>

      <!-- Topics Cards Grid -->
      <div class="topics-grid" id="topics-grid"></div>

    </div>
  </main>

  <script src="topics_list.js"></script>
</body>

</html>

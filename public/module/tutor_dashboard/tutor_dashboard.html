<!DOCTYPE html>
<html lang="en">

<head>

  <script>
    (function () {
      if (window._initialLoaderAdded) return; window._initialLoaderAdded = true;
      document.documentElement.style.backgroundColor = '#060d1f';
      var l = document.createElement('div');
      l.id = 'global-initial-loader';
      l.style.cssText = 'position:fixed;inset:0;background:#060d1f;z-index:9999999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s ease;';
      l.innerHTML = '<style>@keyframes spa-spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes spa-glow-pulse{0%,100%{box-shadow:0 0 15px rgba(6,182,212,0.4),inset 0 0 10px rgba(37,99,235,0.4)}50%{box-shadow:0 0 30px rgba(6,182,212,0.8),inset 0 0 20px rgba(37,99,235,0.8)}}.spa-spinner{width:70px;height:70px;border:4px solid rgba(255,255,255,0.1);border-top-color:#06b6d4;border-right-color:#3b82f6;border-radius:50%;animation:spa-spin 1s linear infinite,spa-glow-pulse 2s ease-in-out infinite;margin-bottom:24px;position:relative}.spa-spinner::after{content:"";position:absolute;top:-4px;left:-4px;right:-4px;bottom:-4px;border-radius:50%;border:4px solid transparent;border-bottom-color:rgba(6,182,212,0.5);animation:spa-spin 1.5s cubic-bezier(0.68,-0.55,0.265,1.55) infinite reverse}.spa-loading-text{font-family:"Outfit",sans-serif;font-size:15px;font-weight:700;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(135deg,#fff,#93c5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:spa-pulse-text 1.5s ease-in-out infinite}@keyframes spa-pulse-text{0%,100%{opacity:0.6;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}</style><div class="spa-spinner"></div><div class="spa-loading-text">Loading</div>';
      document.documentElement.appendChild(l);
      window.addEventListener('load', function () {
        l.style.opacity = '0';
        setTimeout(function () { if (l.parentNode) l.remove(); }, 500);
      });
    })();
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="UniPrep Tutor Dashboard" />
  <title>Tutor Dashboard · UniPrep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../dashboard/dashboard.css" />
  <script src="../side_nav_bar/side_nav_bar.js"></script>
</head>

<body>

  <!-- Background Effects -->
  <div class="bg-fixed"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid-bg"></div>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- TOP HEADER -->
    <header class="top-header">
      <div class="header-left">
        <button class="menu-btn" onclick="toggleSidebar()" aria-label="Open Sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <div class="header-titles">
          <h1 class="page-title">Dashboard</h1>
          <p class="page-sub">Welcome back, Tutor! Track your classes.</p>
        </div>
      </div>
    </header>

    <!-- ROLE SWITCHER TABS -->
    <div class="role-tabs-container">
      <div class="role-tabs">
        <a class="role-tab" href="../dashboard/dashboard.html">Student</a>
        <a class="role-tab active" href="#">Tutor</a>
        <a class="role-tab" href="../admin_dashboard/admin_dashboard.html">Admin</a>
      </div>
    </div>

    <div class="dashboard-grid">

      <!-- STATS SECTION -->
      <section class="stats-section">
        <div class="stat-card">
          <div class="stat-icon s-blue" style="font-size:24px;">🎓</div>
          <div class="stat-info">
            <h3 class="stat-val">120</h3>
            <p class="stat-label">Active Students</p>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon s-cyan" style="font-size:24px;">📚</div>
          <div class="stat-info">
            <h3 class="stat-val">5</h3>
            <p class="stat-label">Classes Managed</p>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon s-gold" style="font-size:24px;">📈</div>
          <div class="stat-info">
            <h3 class="stat-val">68<span class="pct">%</span></h3>
            <p class="stat-label">Avg Class Score</p>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon s-purple" style="font-size:24px;">💬</div>
          <div class="stat-info">
            <h3 class="stat-val">14</h3>
            <p class="stat-label">Unanswered Qs</p>
          </div>
        </div>
      </section>

      <!-- MIDDLE CONTENT ROW -->
      <div class="middle-row" style="grid-template-columns: 1fr;">
        <section class="glass-panel">
          <div class="panel-header">
            <h2 class="panel-title">Recent Student Performances</h2>
          </div>
          <p style="color: var(--text-muted); font-size: 14px;">Tutor-specific data tables and class lists will be
            rendered here...</p>
        </section>
      </div>

    </div>
  </main>

  <script src="../../js/router.js"></script>
  <script src="../dashboard/dashboard.js"></script>
</body>

</html>

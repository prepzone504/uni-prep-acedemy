<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function(){if(window._initialLoaderAdded)return;window._initialLoaderAdded=true;document.documentElement.style.backgroundColor='#060d1f';var l=document.createElement('div');l.id='global-initial-loader';l.style.cssText='position:fixed;inset:0;background:#060d1f;z-index:9999999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s ease;';l.innerHTML='<style>@keyframes spa-spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}.spa-spinner{width:60px;height:60px;border:3px solid rgba(255,255,255,0.1);border-top-color:#06b6d4;border-radius:50%;animation:spa-spin 0.9s linear infinite;margin-bottom:20px}.spa-loading-text{font-family:"Outfit",sans-serif;font-size:13px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:rgba(191,219,254,0.7);}</style><div class="spa-spinner"></div><div class="spa-loading-text">Loading</div>';document.documentElement.appendChild(l);window.addEventListener('load',function(){l.style.opacity='0';setTimeout(function(){if(l.parentNode)l.remove();},500);});})();
  </script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings · UniPrep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../dashboard/dashboard.css"/>
  <link rel="stylesheet" href="settings.css"/>
  <script src="../side_nav_bar/side_nav_bar.js"></script>
</head>
<body>
  <main class="main-content">
    <header class="top-header">
      <div class="header-left">
        <button class="menu-btn" onclick="toggleSidebar()" aria-label="Open Sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="header-titles">
          <h1 class="page-title">⚙️ Settings</h1>
        </div>
      </div>
    </header>

    <div class="settings-page">
      <div class="settings-container">
        
        <!-- Profile Overview (Read Only) -->
        <div class="settings-card profile-card">
          <div class="profile-avatar" id="profile-avatar">AO</div>
          <div class="profile-info">
            <h2 id="profile-name">Adaeze Okonkwo</h2>
            <p class="profile-role">Student Account</p>
          </div>
          <div class="profile-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            Active
          </div>
        </div>

        <!-- Security Settings (Change Password) -->
        <div class="settings-card security-card">
          <div class="card-header">
            <div class="card-icon">🔐</div>
            <div class="card-titles">
              <h3>Security & Password</h3>
              <p>Update your password to keep your account secure.</p>
            </div>
          </div>
          
          <form id="password-form" class="settings-form" autocomplete="off">
            <div class="form-group">
              <label for="current-password">Current Password</label>
              <div class="input-wrap">
                <input type="password" id="current-password" placeholder="Enter current password" required/>
                <button type="button" class="toggle-pw" onclick="togglePassword('current-password', this)">👁️</button>
              </div>
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label for="new-password">New Password</label>
                <div class="input-wrap">
                  <input type="password" id="new-password" placeholder="Minimum 8 characters" required minlength="8"/>
                  <button type="button" class="toggle-pw" onclick="togglePassword('new-password', this)">👁️</button>
                </div>
              </div>
              <div class="form-group">
                <label for="confirm-password">Confirm New Password</label>
                <div class="input-wrap">
                  <input type="password" id="confirm-password" placeholder="Retype new password" required/>
                  <button type="button" class="toggle-pw" onclick="togglePassword('confirm-password', this)">👁️</button>
                </div>
              </div>
            </div>

            <div id="password-error" class="form-error"></div>
            
            <div class="form-actions">
              <button type="submit" class="btn-save">
                <span>Save Password</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
              </button>
            </div>
          </form>
        </div>

      </div>
    </div>
  </main>

  <!-- Background Effects -->
  <div class="bg-fixed"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid-bg"></div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="../../js/router.js"></script>
  <script>
    // Toggle password visibility
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁️';
      }
    }

    // Load profile name from localStorage if exists
    document.addEventListener('DOMContentLoaded', () => {
      const storedName = localStorage.getItem('uniprep_user_name');
      if (storedName) {
        document.getElementById('profile-name').textContent = storedName;
        const parts = storedName.split(' ');
        let initials = parts[0][0];
        if (parts.length > 1) initials += parts[1][0];
        document.getElementById('profile-avatar').textContent = initials.toUpperCase();
      }
    });

    // Handle Password Submit
    document.getElementById('password-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const current = document.getElementById('current-password').value;
      const newPw = document.getElementById('new-password').value;
      const confirmPw = document.getElementById('confirm-password').value;
      const errorDiv = document.getElementById('password-error');
      
      errorDiv.textContent = '';
      errorDiv.style.display = 'none';

      if (newPw !== confirmPw) {
        errorDiv.textContent = 'New passwords do not match.';
        errorDiv.style.display = 'block';
        return;
      }
      if (newPw.length < 8) {
        errorDiv.textContent = 'New password must be at least 8 characters.';
        errorDiv.style.display = 'block';
        return;
      }

      // Mock save interaction
      const btn = this.querySelector('.btn-save');
      const originalHtml = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span> Saving...';
      btn.disabled = true;

      setTimeout(() => {
        btn.innerHTML = originalHtml;
        btn.disabled = false;
        this.reset();
        
        // Show success toast
        const tc = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = 'toast toast-success';
        t.textContent = 'Password successfully updated!';
        tc.appendChild(t);
        setTimeout(() => t.remove(), 3500);
      }, 1200);
    });
  </script>
</body>
</html>
